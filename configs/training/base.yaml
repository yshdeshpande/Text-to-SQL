# Default QLoRA training configuration
model:
  name: "mistralai/Mistral-7B-Instruct-v0.3"
  max_seq_length: 2048

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

lora:
  r: 32
  alpha: 64
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

training:
  output_dir: "checkpoints/base-run"
  num_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  warmup_ratio: 0.05
  weight_decay: 0.01
  lr_scheduler_type: "cosine"
  gradient_checkpointing: true
  bf16: true
  logging_steps: 10
  save_strategy: "epoch"
  eval_strategy: "epoch"
  seed: 42

wandb:
  project: "llm-sql-finetune"
  run_name: null  # auto-generated if null

data:
  train_path: "data/processed/train"
  val_path: "data/processed/val"
  test_path: "data/processed/test"
